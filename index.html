<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κράτηση Τραπεζιού</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Table<span>Res</span></h1>
            <p id="shop-display">Φόρτωση καταστήματος...</p>
        </header>

        <main class="card">
            <div class="input-group">
                <label>Όνομα</label>
                <input type="text" id="cust-name" placeholder="Το όνομά σας">
            </div>
            <div class="row">
                <div class="input-group">
                    <label>Άτομα</label>
                    <input type="number" id="cust-guests" value="2" min="1">
                </div>
                <div class="input-group">
                    <label>Ημερομηνία & Ώρα</label>
                    <input type="datetime-local" id="cust-date">
                </div>
            </div>
            <button class="btn-primary" id="btn-save">Επιβεβαίωση Κράτησης</button>
        </main>
    </div>
    <script type="module" src="client.js"></script>
</body>
</html>
