<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κράτηση Τραπεζιού</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Table<span>Reserve</span></h1>
            <h3 id="shop-display">Φόρτωση...</h3>
        </header>

        <div class="card">
            <div class="input-group">
                <label>Ημερομηνία</label>
                <input type="date" id="cust-date-only">
            </div>

            <div class="input-group">
                <label>Άτομα</label>
                <select id="cust-guests">
                    <option value="1">1 Άτομο</option>
                    <option value="2" selected>2 Άτομα</option>
                    <option value="3">3 Άτομα</option>
                    <option value="4">4 Άτομα</option>
                    <option value="5">5 Άτομα</option>
                    <option value="6">6 Άτομα</option>
                    <option value="8">8 Άτομα</option>
                </select>
            </div>

            <label>Επιλέξτε Ώρα</label>
            <select id="time-select" style="width:100%; margin-top:5px; margin-bottom:10px;">
                <option value="">-- Επιλογή --</option>
            </select>
            
            <div id="time-slots-container" class="time-grid"></div>

            <button class="btn-primary" id="open-modal" style="display:none; margin-top:20px;">Συνέχεια Κράτησης</button>
        </div>
    </div>

    <div id="booking-modal" class="modal">
        <div class="modal-content card">
            <h3>Στοιχεία Κράτησης</h3>
            
            <div class="input-group">
                <label>Ονοματεπώνυμο</label>
                <input type="text" id="cust-name" placeholder="π.χ. Νίκος Παπαδόπουλος">
            </div>

            <div class="input-group">
                <label>Τηλέφωνο</label>
                <input type="tel" id="cust-phone" placeholder="69XXXXXXXX">
            </div>

            <div class="input-group">
                <label>Email (Προαιρετικό)</label>
                <input type="email" id="cust-email" placeholder="name@example.com">
            </div>

            <div class="input-group">
                <label>Προτίμηση Χώρου</label>
                <select id="cust-location">
                    <option value="Εσωτερικός">Εσωτερικός Χώρος</option>
                    <option value="Εξωτερικός">Εξωτερικός Χώρος</option>
                    <option value="Δεν έχω προτίμηση">Δεν έχω προτίμηση</option>
                </select>
            </div>

            <div class="input-group">
                <label>Ειδικό Γεγονός</label>
                <input type="text" id="cust-occasion" placeholder="π.χ. Γενέθλια, Επέτειος">
            </div>

            <div class="input-group">
                <label>Επιπλέον Αιτήματα</label>
                <textarea id="cust-comments" rows="2" style="padding:10px; border-radius:8px; border:1px solid #e2e8f0; font-family:inherit;"></textarea>
            </div>

            <button class="btn-primary" id="btn-save">Επιβεβαίωση Κράτησης</button>
            <button class="btn-link" id="close-modal">Ακύρωση</button>
        </div>
    </div>

    <script type="module" src="client.js"></script>
</body>
</html>
