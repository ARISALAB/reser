<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Κράτηση Τραπεζιού</title>
    <link rel="stylesheet" href="style.css"> <style>
        .input-group { margin-bottom: 15px; }
        .input-field { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #333; }
        textarea.input-field { resize: vertical; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="display-shop-name">Φόρτωση...</h2>
        
        <div id="booking-form">
            <div class="input-group">
                <label>Όνομα</label>
                <input type="text" id="name" class="input-field" placeholder="Το όνομά σας">
            </div>
            <div class="input-group">
                <label>Τηλέφωνο</label>
                <input type="tel" id="phone" class="input-field" placeholder="69XXXXXXXX">
            </div>
            <div class="input-group">
                <label>Άτομα</label>
                <input type="number" id="guests" class="input-field" value="2" min="1">
            </div>
            <div class="input-group">
                <label>Ημερομηνία</label>
                <input type="date" id="date" class="input-field">
            </div>
            <div id="time-slots" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
                </div>

            <div class="input-group">
                <label>Πού προτιμάτε να καθίσετε;</label>
                <select id="seating-location" class="input-field">
                    <option value="Εσωτερικός Χώρος">Εσωτερικός Χώρος</option>
                    <option value="Εξωτερικός Χώρος">Εξωτερικός Χώρος</option>
                    <option value="Δεν έχω προτίμηση">Δεν έχω προτίμηση</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ειδικό Γεγονός (π.χ. Γενέθλια)</label>
                <input type="text" id="special-occasion" class="input-field" placeholder="Προαιρετικά">
            </div>
            <div class="input-group">
                <label>Επιπλέον Αιτήματα</label>
                <textarea id="additional-comments" class="input-field" rows="2" placeholder="π.χ. Παιδικό κάθισμα..."></textarea>
            </div>

            <button id="btn-submit" style="width:100%; padding:15px; background:#2563eb; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ΟΛΟΚΛΗΡΩΣΗ ΚΡΑΤΗΣΗΣ</button>
        </div>
    </div>

    <script type="module" src="client.js"></script>
</body>
</html>
