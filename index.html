<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableRes | Σύστημα Κρατήσεων</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Table<span>Res</span></h1>
            <p id="shop-display">Φόρτωση...</p>
        </header>

        <main class="card">
            <div class="input-group">
                <label>1. Ημερομηνία</label>
                <input type="date" id="cust-date-only">
            </div>

            <div class="input-group">
                <label>2. Άτομα</label>
                <input type="number" id="cust-guests" value="2" min="1" max="20">
            </div>

            <div class="input-group">
                <label>3. Επιλογή Ώρας</label>
                <select id="time-select">
                    <option value="">Επιλέξτε ώρα...</option>
                </select>
            </div>

            <label style="font-size: 0.85rem; font-weight: 600;">Ή πατήστε ένα slot:</label>
            <div id="time-slots-container" class="time-grid"></div>

            <button class="btn-primary" id="open-modal" style="margin-top: 25px; display:none;">
                Συνέχεια Κράτησης
            </button>
        </main>
    </div>

    <div id="booking-modal" class="modal">
        <div class="modal-content card">
            <h3>Στοιχεία Επικοινωνίας</h3>
            <div class="input-group">
                <label>Ονοματεπώνυμο</label>
                <input type="text" id="cust-name" placeholder="π.χ. Γιώργος Παππάς">
            </div>
            <div class="input-group">
                <label>Τηλέφωνο</label>
                <input type="tel" id="cust-phone" placeholder="69XXXXXXXX">
            </div>
            <div class="input-group">
                <label>Email (Προαιρετικό)</label>
                <input type="email" id="cust-email" placeholder="mail@example.com">
            </div>
            <button class="btn-primary" id="btn-save">Ολοκλήρωση Κράτησης</button>
            <button class="btn-link" id="close-modal">Αλλαγή ώρας</button>
        </div>
    </div>

    <script type="module" src="client.js"></script>
</body>
</html>

            <div class="input-group">
                <label>Πού προτιμάτε να καθίσετε;</label>
                <select id="seating-location" class="input-field">
                    <option value="Εσωτερικός Χώρος">Εσωτερικός Χώρος</option>
                    <option value="Εξωτερικός Χώρος">Εξωτερικός Χώρος</option>
                    <option value="Δεν έχω προτίμηση">Δεν έχω προτίμηση</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ειδικό Γεγονός (π.χ. Γενέθλια)</label>
                <input type="text" id="special-occasion" class="input-field" placeholder="Προαιρετικά">
            </div>
            <div class="input-group">
                <label>Επιπλέον Αιτήματα</label>
                <textarea id="additional-comments" class="input-field" rows="2" placeholder="π.χ. Παιδικό κάθισμα..."></textarea>
            </div>

            <button id="btn-submit" style="width:100%; padding:15px; background:#2563eb; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ΟΛΟΚΛΗΡΩΣΗ ΚΡΑΤΗΣΗΣ</button>
        </div>
    </div>

    <script type="module" src="client.js"></script>
</body>
</html>
