<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TableRes | Κράτηση</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Table<span>Res</span></h1>
            <p id="shop-display">Φόρτωση καταστήματος...</p>
        </header>

        <main class="card">
            <div class="input-group">
                <label>1. Επιλέξτε Ημερομηνία</label>
                <input type="date" id="cust-date-only">
            </div>

            <div id="time-selection-area" style="display: none; margin-top: 20px;">
                <label style="font-size: 0.85rem; font-weight: 600;">2. Επιλέξτε Ώρα (ανά μισάωρο)</label>
                <div id="time-slots-container" class="time-grid">
                    </div>
            </div>

            <div id="guests-selection-area" style="display: none; margin-top: 20px;">
                <div class="input-group">
                    <label>3. Αριθμός Ατόμων</label>
                    <input type="number" id="cust-guests" value="2" min="1" max="20">
                </div>
                <button class="btn-primary" id="open-modal" style="margin-top: 10px;">
                    Συνέχεια Κράτησης
                </button>
            </div>
        </main>
    </div>

    <div id="booking-modal" class="modal">
        <div class="modal-content card">
            <h3>Στοιχεία Επικοινωνίας</h3>
            <div class="input-group">
                <label>Ονοματεπώνυμο</label>
                <input type="text" id="cust-name" placeholder="π.χ. Γιώργος Παππάς">
            </div>
            <div class="input-group">
                <label>Τηλέφωνο</label>
                <input type="tel" id="cust-phone" placeholder="69XXXXXXXX">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="cust-email" placeholder="mail@example.com">
            </div>
            <button class="btn-primary" id="btn-save">Ολοκλήρωση Κράτησης</button>
            <button class="btn-link" id="close-modal">Αλλαγή ώρας/ημερομηνίας</button>
        </div>
    </div>

    <script type="module" src="client.js"></script>
</body>
</html>
